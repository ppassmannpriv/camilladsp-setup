<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamillaDSP GUI</title>
</head>
<body class="bg-slate-900 text-white overflow-hidden">
    <div id="app" class="w-[800px] h-[480px] flex flex-col mx-auto bg-slate-800 shadow-2xl relative">
        <!-- Title Bar -->
        <header class="h-12 bg-slate-950 flex items-center justify-between px-4 border-b border-slate-700">
            <h1 class="text-xl font-bold text-sky-400">CamillaDSP GUI</h1>
            <button id="menu-btn" class="p-2 hover:bg-slate-700 rounded-md transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </header>

        <!-- Main Content (Meters) -->
        <main id="main-view" class="flex-1 flex flex-col p-2 overflow-hidden">
            <div class="flex-1 grid grid-cols-[1fr_auto_1fr] gap-2">
                <!-- Input Meters -->
                <div class="flex flex-col border border-slate-700 rounded-lg p-2 bg-slate-900/50">
                    <h2 class="text-[10px] uppercase font-bold text-slate-500 mb-1">Inputs</h2>
                    <div id="input-meters" class="flex-1 flex gap-1 justify-center items-end">
                        <!-- Meters will be injected here -->
                    </div>
                </div>

                <!-- Master Volume Slider (Vertical) -->
                <div class="flex flex-col items-center justify-center px-2 bg-slate-900/30 border-x border-slate-700/50">
                    <span class="text-[10px] uppercase font-bold text-sky-500 mb-2">Vol</span>
                    <div class="flex-1 relative w-8 group">
                        <input type="range" id="volume-slider" min="-100" max="0" step="0.5" value="-20" orient="vertical" 
                               class="absolute inset-0 w-8 h-full bg-slate-800 rounded-full cursor-pointer focus:outline-none overflow-hidden"
                               style="writing-mode: vertical-lr;">
                    </div>
                    <span id="volume-text" class="text-[10px] font-mono text-sky-400 mt-2">-20.0</span>
                </div>

                <!-- Output Meters -->
                <div class="flex flex-col border border-slate-700 rounded-lg p-2 bg-slate-900/50">
                    <h2 class="text-[10px] uppercase font-bold text-slate-500 mb-1">Outputs</h2>
                    <div id="output-meters" class="flex-1 flex gap-1 justify-center items-end">
                        <!-- Meters will be injected here -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Menu Overlay (Hidden by default) -->
        <div id="menu-overlay" class="absolute inset-0 bg-slate-950/90 z-50 flex flex-col p-8 transition-transform translate-x-full">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">Menu</h2>
                <button id="close-menu" class="p-2 hover:bg-slate-700 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <nav class="flex-1 grid grid-cols-2 gap-2 text-lg">
                <button class="menu-item flex flex-col items-center justify-center p-3 hover:bg-slate-800 rounded-lg border border-slate-700 transition-colors" data-view="meters">
                    <span class="font-bold">Meters</span>
                </button>
                <button class="menu-item flex flex-col items-center justify-center p-3 hover:bg-slate-800 rounded-lg border border-slate-700 transition-colors" data-view="pipeline">
                    <span class="font-bold">Pipeline</span>
                </button>
                <button class="menu-item flex flex-col items-center justify-center p-3 hover:bg-slate-800 rounded-lg border border-slate-700 transition-colors" data-view="spectrum">
                    <span class="font-bold">Spectrum</span>
                </button>
                <button class="menu-item flex flex-col items-center justify-center p-3 hover:bg-slate-800 rounded-lg border border-slate-700 transition-colors" data-view="configs">
                    <span class="font-bold">Configs</span>
                </button>
                <button class="menu-item flex flex-col items-center justify-center p-3 hover:bg-slate-800 rounded-lg border border-slate-700 transition-colors" data-view="status">
                    <span class="font-bold">Status</span>
                </button>
                <button class="menu-item flex flex-col items-center justify-center p-3 hover:bg-slate-800 rounded-lg border border-slate-700 transition-colors" data-view="settings">
                    <span class="font-bold">Settings</span>
                </button>
            </nav>
            <div class="mt-auto flex items-center gap-2 text-sm text-slate-500">
                <div id="status-indicator" class="w-3 h-3 rounded-full bg-red-500"></div>
                <span id="status-text">Disconnected</span>
                <span id="dev-mode-badge" class="ml-auto px-2 py-0.5 bg-amber-500/20 text-amber-500 border border-amber-500/50 rounded text-[10px] hidden">DEV MODE</span>
            </div>
        </div>

        <!-- Pipeline View (Hidden) -->
        <div id="pipeline-view" class="hidden flex-1 p-4 overflow-auto">
             <h2 class="text-xl mb-4">Pipeline Visualization</h2>
             <div id="pipeline-container" class="space-y-4">
                 <!-- Pipeline nodes will go here -->
             </div>
        </div>

        <!-- Spectrum View (Hidden) -->
        <div id="spectrum-view" class="hidden flex-1 p-4 flex flex-col">
            <h2 class="text-xl mb-4">Spectrum Analyzer (In 1/2)</h2>
            <canvas id="spectrum-canvas" class="flex-1 bg-black rounded-lg border border-slate-700"></canvas>
        </div>

        <!-- Settings View (Hidden) -->
        <div id="settings-view" class="hidden flex-1 p-4">
            <h2 class="text-xl mb-4">Settings</h2>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-3 bg-slate-700/50 rounded-lg border border-slate-700">
                    <span>Developer Mode</span>
                    <input type="checkbox" id="dev-mode-toggle" checked class="w-6 h-6 rounded border-slate-700 bg-slate-800 text-sky-500 focus:ring-sky-500">
                </div>
                <div class="flex flex-col gap-2 p-3 bg-slate-700/50 rounded-lg border border-slate-700">
                    <label class="text-xs text-slate-400">CamillaDSP Address</label>
                    <div class="flex gap-2">
                        <input type="text" id="address-input" value="localhost:5011" class="flex-1 bg-slate-900 border border-slate-600 rounded px-2 py-1 text-sm">
                        <button id="reconnect-btn" class="bg-sky-600 hover:bg-sky-500 px-3 py-1 rounded text-sm font-semibold transition-colors">Reconnect</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Configs View (Hidden) -->
        <div id="configs-view" class="hidden flex-1 p-4 flex flex-col">
            <h2 class="text-xl mb-4 text-sky-400 font-bold border-b border-slate-700 pb-2">Configurations</h2>
            <div id="configs-list" class="flex-1 space-y-2 overflow-auto">
                <!-- Config items will go here -->
            </div>
        </div>

        <!-- Status View (Hidden) -->
        <div id="status-view" class="hidden flex-1 p-4 flex flex-col">
            <h2 class="text-xl mb-4 text-sky-400 font-bold border-b border-slate-700 pb-2">System Status</h2>
            <div class="grid grid-cols-2 gap-4 overflow-auto text-sm">
                <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                    <div class="text-slate-500 text-[10px] uppercase font-bold">Samplerate</div>
                    <div id="status-samplerate" class="text-lg font-mono text-sky-300">-- Hz</div>
                </div>
                <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                    <div class="text-slate-500 text-[10px] uppercase font-bold">State</div>
                    <div id="status-state" class="text-lg font-mono text-emerald-400">--</div>
                </div>
                <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700 col-span-2">
                    <div class="text-slate-500 text-[10px] uppercase font-bold">Capture Device</div>
                    <div id="status-capture" class="font-mono text-slate-300 truncate">--</div>
                </div>
                <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700 col-span-2">
                    <div class="text-slate-500 text-[10px] uppercase font-bold">Playback Device</div>
                    <div id="status-playback" class="font-mono text-slate-300 truncate">--</div>
                </div>
            </div>
        </div>

        <!-- Footer / Mini Status -->
        <footer class="h-8 bg-slate-950 border-t border-slate-700 flex items-center px-4 justify-between text-[10px] font-mono text-slate-500">
            <div class="flex items-center gap-4">
                <span id="footer-samplerate">SR: --</span>
                <span id="footer-state">State: --</span>
            </div>
            <div id="footer-msg" class="truncate max-w-[300px]">Idle</div>
            <div class="flex items-center gap-2">
                <div id="footer-status-indicator" class="w-2 h-2 rounded-full bg-red-500"></div>
                <span id="footer-status-text">OFFLINE</span>
            </div>
        </footer>
    </div>
    <script type="module" src="./main.ts"></script>
</body>
</html>
